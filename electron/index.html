<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>aMule</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #238636;
      --accent-hover: #2ea043;
      --blue: #388bfd;
      --red: #f85149;
      --yellow: #d29922;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
    .conn-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .conn-form input {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 8px; font-size: 13px;
    }
    .conn-form input[type="number"] { width: 80px; }
    .conn-form input.host { width: 140px; }
    .conn-form input.pass { width: 120px; }

    /* ── Buttons ── */
    button {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 12px; font-size: 13px;
      cursor: pointer; white-space: nowrap;
    }
    button:hover { border-color: var(--muted); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:hover { background: var(--accent-hover); }
    button.danger { border-color: var(--red); color: var(--red); }
    button:disabled { opacity: .4; cursor: default; }

    /* ── Status bar ── */
    .status-bar {
      padding: 4px 16px;
      font-size: 12px; color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex; gap: 16px; align-items: center;
    }
    .status-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 4px;
    }
    .status-dot.off { background: var(--red); }
    .status-dot.on  { background: var(--accent); }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 8px 16px; font-size: 13px; font-weight: 500;
      cursor: pointer; border-bottom: 2px solid transparent;
      color: var(--muted);
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--blue); }

    /* ── Panels ── */
    .panels { flex: 1; overflow: auto; padding: 16px; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Table ── */
    table {
      width: 100%; border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      text-align: left; padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }
    th { color: var(--muted); font-weight: 600; position: sticky; top: 0; background: var(--bg); }
    tr:hover td { background: rgba(56,139,253,.06); }

    /* ── Progress ── */
    .progress-bar {
      width: 100%; height: 6px;
      background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--blue); border-radius: 3px;
      transition: width .3s;
    }

    /* ── Link form ── */
    .link-form {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .link-form input { flex: 1; min-width: 200px; }
    .link-form input,
    .search-form input,
    .search-form select {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 8px; font-size: 13px;
    }
    .search-form select {
      padding: 5px 4px;
    }
    .search-form {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .search-form input { flex: 1; min-width: 200px; }

    /* ── JSON output ── */
    pre.json {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; overflow: auto;
      max-height: 400px; font-size: 12px; white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Discoveries ── */
    .disc-keywords {
      display: flex; flex-direction: column; gap: 6px;
      margin-bottom: 16px;
    }
    .disc-kw-row {
      display: flex; gap: 8px; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px;
    }
    .disc-kw-toggle-wrap {
      display: inline-flex; gap: 6px; align-items: center;
      font-size: 12px; color: var(--muted); user-select: none;
    }
    .disc-kw-toggle-wrap input {
      margin: 0;
    }
    .disc-kw-row .kw-label { flex: 1; font-weight: 500; }
    .disc-kw-row select, .disc-add-form select {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 6px; font-size: 13px;
    }
    .disc-add-form {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .disc-add-form input {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 8px; font-size: 13px; flex: 1; min-width: 160px;
    }
    .disc-log {
      font-size: 12px; color: var(--muted); margin-bottom: 8px;
      max-height: 48px; overflow: auto;
    }
    .tag {
      display: inline-block; background: var(--surface);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 1px 6px; font-size: 11px; color: var(--muted);
      margin-right: 4px;
    }
    .time-ago { color: var(--muted); font-size: 12px; }

    /* ── Utilities ── */
    .mb { margin-bottom: 12px; }
    .muted { color: var(--muted); }
    .error { color: var(--red); }
    .flex-gap { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Login vs main app ── */
    .hidden { display: none !important; }
    .login-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px;
      min-height: 100vh;
    }
    .login-screen h1 { font-size: 22px; font-weight: 600; }
    .login-screen .conn-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }
    .login-screen .conn-form input { width: 100%; }
    .login-screen .conn-form input[type="number"] { width: 100%; }
    .main-app {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .main-app header {
      justify-content: space-between;
    }

    th.sortable {
      cursor: pointer;
      user-select: none;
    }
    th.sortable:hover { color: var(--text); }
    th.sortable .sort-ind {
      display: inline-block;
      min-width: 10px;
      margin-left: 2px;
      font-size: 10px;
      color: var(--blue);
    }

    .search-popular { margin-bottom: 16px; }
    .search-kw-tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .search-kw-tag:hover { border-color: var(--muted); color: var(--text); }
    .search-kw-tag .kw-n { color: var(--muted); font-size: 11px; margin-left: 4px; }
  </style>
</head>
<body>
<div class="app">

  <!-- Login (shown until connected) -->
  <div id="loginScreen" class="login-screen">
    <h1>aMule Discoveries</h1>
    <form id="loginForm" class="conn-form" action="#" method="post">
      <input id="host" class="host" placeholder="Host" value="127.0.0.1" />
      <input id="port" type="number" placeholder="Port" value="4712" />
      <input id="password" class="pass" type="password" placeholder="Password" value="password" autocomplete="current-password" autofocus />
      <button type="submit" id="connectBtn" class="primary">Connect</button>
    </form>
  </div>

  <!-- Main UI (after login) -->
  <div id="mainApp" class="main-app hidden">
  <header class="hidden">
    <h1>aMule</h1>
    <button id="disconnectBtn" class="danger">Disconnect</button>
  </header>

  <!-- Status bar -->
  <div class="status-bar hidden">
    <span><span class="status-dot off" id="statusDot"></span><span id="statusText">Disconnected</span></span>
    <span id="speedInfo"></span>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabBar">
    <div class="tab active" data-tab="shared">My Collection</div>
    <div class="tab" data-tab="search">Search</div>
    <div class="tab" data-tab="discoveries">Discoveries</div>
  </div>

  <!-- Panels -->
  <div class="panels">

    <!-- Shared Files -->
    <div class="panel active" id="panel-shared">
      <div class="link-form">
        <input id="ed2kLink" placeholder="ed2k:// or magnet link" />
        <button id="addLinkBtn" disabled>Add Link</button>
        <button id="refreshSharedBtn" disabled>Refresh</button>
      </div>
      <table>
        <thead id="sharedThead">
          <tr>
            <th style="width:70px">Action</th>
            <th class="sortable" data-sort="name">File Name<span class="sort-ind" aria-hidden="true"></span></th>
            <th class="sortable" style="width:120px" data-sort="size">Size<span class="sort-ind" aria-hidden="true"></span></th>
            <th class="sortable" style="width:98px" data-sort="popularity" title="Relative share volume in this list: 5★ = highest upload ratio, 0★ = lowest">Popularity<span class="sort-ind" aria-hidden="true"></span></th>
            <th class="sortable" style="width:100px" data-sort="added" title="When the file was first added to the collection">Added<span class="sort-ind" aria-hidden="true"></span></th>
            <th style="width:160px"></th>
          </tr>
        </thead>
        <tbody id="sharedBody"></tbody>
      </table>
      <p class="muted mb" id="sharedEmpty" style="display:none">No shared files.</p>
    </div>

    <!-- Search -->
    <div class="panel" id="panel-search">
      <form id="searchForm" class="search-form" action="#" method="post">
        <input id="searchQuery" placeholder="Search query..." />
        <select id="searchNetwork">
          <option value="local">Local</option>
          <option value="kad">Kad</option>
        </select>
        <button type="submit" id="searchBtn" disabled>Search</button>
      </form>
      <div class="search-popular">
        <div class="muted mb">Popular from My Collection</div>
        <div id="searchPopularTags" class="flex-gap"></div>
      </div>
      <p class="muted mb" id="searchStatus"></p>
      <table>
        <thead>
          <tr>
            <th style="width:80px">Action</th>
            <th>File Name</th>
            <th style="width:120px">Size</th>
            <th style="width:80px">Sources</th>
          </tr>
        </thead>
        <tbody id="searchBody"></tbody>
      </table>
    </div>

    <!-- Discoveries -->
    <div class="panel" id="panel-discoveries">
      <div class="disc-add-form">
        <input id="discKeywordInput" placeholder="Keywords..."/>
        <select id="discIntervalSelect">
          <option value="1h">Every hour</option>
          <option value="6h" selected>Every 6 hours</option>
          <option value="1d">Every day</option>
          <option value="1w">Every week</option>
        </select>
        <button id="discAddBtn">Add</button>
        <button id="discRunNowBtn" disabled>Run All Now</button>
      </div>
      <div class="disc-keywords" id="discKeywords"></div>
      <div class="disc-log" id="discLog"></div>
      <table>
        <thead>
          <tr>
            <th style="width:80px">Action</th>
            <th>File Name</th>
            <th style="width:120px">Size</th>
            <th style="width:80px">Sources</th>
            <th style="width:120px">Keyword</th>
            <th style="width:140px">First Seen</th>
          </tr>
        </thead>
        <tbody id="discBody"></tbody>
      </table>
      <p class="muted mb" id="discEmpty" style="display:none">No discoveries yet.</p>
    </div>

  </div>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
